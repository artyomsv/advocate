services:
  postgres:
    image: postgres:17-alpine
    container_name: advocate-postgres
    ports:
      - "${POSTGRES_PORT:-36432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: advocate
      POSTGRES_USER: advocate
      POSTGRES_PASSWORD: advocate
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "advocate"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: advocate-redis
    ports:
      - "${REDIS_PORT:-36479}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      target: runtime
    container_name: advocate-api
    ports:
      - "${API_PORT:-36401}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RUNNING_IN_CONTAINER: "true"
      API_PORT: "3000"
      # Container-internal hostnames (service names); host port vars are only
      # used by the host when connecting from outside the compose network.
      DATABASE_URL: postgresql://advocate:advocate@postgres:5432/advocate
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      QWEN_API_KEY: "${QWEN_API_KEY:-}"
      LLM_MONTHLY_BUDGET_CENTS: "${LLM_MONTHLY_BUDGET_CENTS:-2000}"
      LLM_DEFAULT_MODE: "${LLM_DEFAULT_MODE:-balanced}"
      KEYCLOAK_URL: "${KEYCLOAK_URL:-http://host.docker.internal:9080}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-advocate}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-advocate-app}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHANNEL_ID: "${TELEGRAM_CHANNEL_ID:-}"
      CREDENTIAL_MASTER_KEY: "${CREDENTIAL_MASTER_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      # Use 127.0.0.1 not localhost — Alpine wget resolves localhost to IPv6 ::1 first,
      # but Fastify only binds to IPv4 interfaces, so the check would fail until retry.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
