services:
  postgres:
    image: postgres:17-alpine
    container_name: mynah-postgres
    ports:
      - "${POSTGRES_PORT:-36432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mynah
      POSTGRES_USER: mynah
      POSTGRES_PASSWORD: mynah
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mynah"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: mynah-redis
    ports:
      - "${REDIS_PORT:-36479}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      target: runtime
    container_name: mynah-api
    ports:
      - "${API_PORT:-36401}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RUNNING_IN_CONTAINER: "true"
      API_PORT: "3000"
      # Container-internal hostnames (service names); host port vars are only
      # used by the host when connecting from outside the compose network.
      DATABASE_URL: postgresql://mynah:mynah@postgres:5432/mynah
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      QWEN_API_KEY: "${QWEN_API_KEY:-}"
      LLM_MONTHLY_BUDGET_CENTS: "${LLM_MONTHLY_BUDGET_CENTS:-2000}"
      LLM_DEFAULT_MODE: "${LLM_DEFAULT_MODE:-balanced}"
      # Container fetches JWKS via host.docker.internal. Keycloak mints tokens
      # with iss=http://localhost:9080 (what the host + SPA see), so issuer
      # verification must match that, not the container-side URL.
      KEYCLOAK_URL: "http://host.docker.internal:9080"
      KEYCLOAK_ISSUER_URL: "http://localhost:9080"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-mynah}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-mynah-dashboard}"
      # Never bypass auth in the container — host-side .env may set this to
      # 'true' for local Node processes, but container boots must verify.
      AUTH_DEV_BYPASS: "false"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHANNEL_ID: "${TELEGRAM_CHANNEL_ID:-}"
      CREDENTIAL_MASTER_KEY: "${CREDENTIAL_MASTER_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    healthcheck:
      # Use 127.0.0.1 not localhost — Alpine wget resolves localhost to IPv6 ::1 first,
      # but Fastify only binds to IPv4 interfaces, so the check would fail until retry.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      target: worker
    container_name: mynah-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RUNNING_IN_CONTAINER: "true"
      DATABASE_URL: postgresql://mynah:mynah@postgres:5432/mynah
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      GOOGLE_AI_API_KEY: "${GOOGLE_AI_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      QWEN_API_KEY: "${QWEN_API_KEY:-}"
      LLM_MONTHLY_BUDGET_CENTS: "${LLM_MONTHLY_BUDGET_CENTS:-2000}"
      LLM_DEFAULT_MODE: "${LLM_DEFAULT_MODE:-balanced}"
      # Container fetches JWKS via host.docker.internal; issuer verification
      # uses the URL Keycloak actually mints tokens with (localhost:9080).
      KEYCLOAK_URL: "http://host.docker.internal:9080"
      KEYCLOAK_ISSUER_URL: "http://localhost:9080"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-mynah}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-mynah-dashboard}"
      # Never bypass auth in the container — host-side .env may set this to
      # 'true' for local Node processes, but container boots must verify.
      AUTH_DEV_BYPASS: "false"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHANNEL_ID: "${TELEGRAM_CHANNEL_ID:-}"
      CREDENTIAL_MASTER_KEY: "${CREDENTIAL_MASTER_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # Worker inherits runtime stage's HTTP healthcheck but doesn't serve HTTP.
    # Disable it; worker health is observed via queue consumption logs.
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
      target: runtime
      args:
        # Browser-facing values — the SPA talks to Keycloak + API via the
        # host, not via the Docker network (compose internal DNS isn't
        # available inside the browser).
        VITE_KEYCLOAK_URL: "http://localhost:9080"
        VITE_KEYCLOAK_REALM: "mynah"
        VITE_KEYCLOAK_CLIENT_ID: "mynah-dashboard"
        VITE_API_BASE_URL: "http://localhost:36401"
    container_name: mynah-dashboard
    ports:
      - "${DASHBOARD_PORT:-36400}:80"
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  # Explicit names force Docker to treat these as distinct from legacy
  # advocate_pgdata / advocate_redisdata volumes (which can be cleaned up
  # manually once the rename is verified). Fresh volumes = fresh DB.
  pgdata:
    name: mynah-pgdata
  redisdata:
    name: mynah-redisdata
