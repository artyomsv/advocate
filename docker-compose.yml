services:
  postgres:
    image: postgres:17-alpine
    container_name: advocate-postgres
    ports:
      - "${POSTGRES_PORT:-36432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: advocate
      POSTGRES_USER: advocate
      POSTGRES_PASSWORD: advocate
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "advocate"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: advocate-redis
    ports:
      - "${REDIS_PORT:-36479}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
