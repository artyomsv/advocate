server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — any non-file request returns index.html so
  # react-router handles routing on the client.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache static assets (Vite adds content hashes to filenames).
  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|webp|woff2)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
  }
}
